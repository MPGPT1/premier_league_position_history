name: Update Premier League Position Chart

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  update-chart:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Premier League chart generator
        run: |
          python -m src.main

      - name: Commit updated chart files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/index.html docs/README.md outputs/position_history.csv outputs/latest_table.csv outputs/finished_matches.csv outputs/raw_matches.csv outputs/premier_league_position_history.html

          git commit -m "Update Premier League position chart" || echo "No changes to commit"
          git push