name: Update Premier League Position Chart

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  update-chart:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Confirm token exists
        run: |
          if [ -z "$FOOTBALL_DATA_API_TOKEN" ]; then
            echo "FOOTBALL_DATA_API_TOKEN is missing"
            exit 1
          else
            echo "FOOTBALL_DATA_API_TOKEN exists"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run chart generator
        run: |
          python -m src.main

      - name: Commit generated chart files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A

          git commit -m "Update Premier League position chart" || echo "No changes to commit"
          git push