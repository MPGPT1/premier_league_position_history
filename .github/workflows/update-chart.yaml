name: Update Premier League Position Chart

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  update-chart:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Confirm token exists
        run: |
          if [ -z "$FOOTBALL_DATA_API_TOKEN" ]; then
            echo "FOOTBALL_DATA_API_TOKEN is missing"
            exit 1
          else
            echo "FOOTBALL_DATA_API_TOKEN exists"
          fi

      - name: Show repository structure
        run: |
          echo "Current directory:"
          pwd

          echo "Root files:"
          ls -la

          echo "src files:"
          ls -la src || true

          echo "requirements.txt:"
          cat requirements.txt || true

      - name: Install dependencies
        run: |
          python --version
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Confirm Python imports
        run: |
          python - <<'PY'
          import pandas
          import requests
          import src.config
          import src.fetch_data
          import src.table_builder
          import src.visualise
          import src.main
          print("All imports succeeded.")
          PY

      - name: Test football-data API connection
        run: |
          python - <<'PY'
          import os
          import requests

          token = os.getenv("FOOTBALL_DATA_API_TOKEN")

          url = "https://api.football-data.org/v4/competitions/PL/matches"
          headers = {"X-Auth-Token": token}
          params = {"season": 2025}

          response = requests.get(url, headers=headers, params=params, timeout=30)

          print("Status code:", response.status_code)
          print("Response preview:", response.text[:500])

          if response.status_code != 200:
              raise SystemExit("football-data API request failed.")
          PY

      - name: Run chart generator
        env:
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}
        run: |
          python -m src.main

      - name: Show generated files
        run: |
          echo "docs:"
          ls -la docs || true

          echo "outputs:"
          ls -la outputs || true

      - name: Commit generated chart files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git status
          git add -A

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "Update Premier League position chart"

          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done